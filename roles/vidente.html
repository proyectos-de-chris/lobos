<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vidente</title>
  <style>
    body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b1220; color:#e8eefc; }
    .wrap{ max-width: 900px; margin: 30px auto; padding: 0 16px; }
    .card{ background:#111b33; border:1px solid rgba(255,255,255,.12); border-radius:16px; padding: 18px; }
    h1{ margin: 0 0 10px; }
    p{ margin: 10px 0; color:#aab5d6; line-height:1.5; }
    ul{ margin: 10px 0 0 18px; color:#e8eefc; }
    .tag{ display:inline-block; padding:6px 10px; border-radius: 999px; border:1px solid rgba(126,224,198,.45); background: rgba(126,224,198,.12); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tag">Vidente</div>
      <h1>Tu rol</h1>

      <div class="roleMedia">          
        <img src="../images/vidente.png" alt="Carta de Vidente" class="roleCardImage">        
      </div>   
      
      <p>Cada noche, podrás preguntar discretamente si un jugador/a que tu elijas es hombre-lobo o mujer-loba. </p>
      <ul>
        <li>Con esa información, debes ayudar a los demás aldeanos/as en la decisión durante el día.</li>
        <li>Sé discreto/a para no ser descubierto/a por los lobos/as.</li>
      </ul>
    </div>
  </div>
</body>
</html>
