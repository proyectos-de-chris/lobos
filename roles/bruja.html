<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brujo / Bruja</title>
  <style>
    body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b1220; color:#e8eefc; }
    .wrap{ max-width: 900px; margin: 30px auto; padding: 0 16px; }
    .card{ background:#111b33; border:1px solid rgba(255,255,255,.12); border-radius:16px; padding: 18px; }
    h1{ margin: 0 0 10px; }
    p{ margin: 10px 0; color:#aab5d6; line-height:1.5; }
    ul{ margin: 10px 0 0 18px; color:#e8eefc; }
    .tag{ display:inline-block; padding:6px 10px; border-radius: 999px; border:1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.08); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tag">Brujo/Bruja</div>
      
      <div class="roleMedia">          
        <img src="../images/bruja.png" alt="Carta de Brujo / Bruja" class="roleCardImage">        
      </div>
      
      <h1>Tu rol</h1>
      <p>Tienes dos pociones que puedes usar durante la noche:</p>
      <ul>
        <li><b>Curativa:</b> puedes resucitar a un jugador que los hombres-lobo hayan asesinado.</li>
        <li><b>Venenosa:</b> puedes asesinar a un jugador a tu elección.</li>
      </ul>
      <p>Ojo: solo puedes usar cada poción una sola vez en toda la partida.</p>
    </div>
  </div>
</body>
</html>
