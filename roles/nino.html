<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Niño/Niña</title>
  <style>
    body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b1220; color:#e8eefc; }
    .wrap{ max-width: 900px; margin: 30px auto; padding: 0 16px; }
    .card{ background:#111b33; border:1px solid rgba(255,255,255,.12); border-radius:16px; padding: 18px; }
    h1{ margin: 0 0 10px; }
    p{ margin: 10px 0; color:#aab5d6; line-height:1.5; }
    ul{ margin: 10px 0 0 18px; color:#e8eefc; }
    .tag{ display:inline-block; padding:6px 10px; border-radius: 999px; border:1px solid rgba(110,168,254,.4); background: rgba(110,168,254,.12); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="tag">Niño/Niña</div>
      
      <div class="roleMedia">          
        <img src="../images/nina.png" alt="Carta de Niño / Niña" class="roleCardImage">        
      </div>
      
      <h1>Tu rol</h1>
      <p>Durante la noche, puedes espiar mientras los lobos/as asesinan (solo en su turno), entreabriendo los ojos.</p>
      <ul>
        <li>Ten mucho cuidado de no ser descubierta.</li>
        <li>Si te descubren, serás tú quien muera.</li>
      </ul>
    </div>
  </div>
</body>
</html>
